# yaml-language-server: $schema=./policy.schema.json
#
# The prototype's policies.json converted to the v1 pack format — the
# reference policy for the mock CRM server (demo/mock_server.py).
#
# Full parity with the prototype policy as of Phase 3a: web.fetch/http.post are
# allowed again, now safe because taint tracking + a sequence rule block the
# exfiltration path they would otherwise open.

schema_version: 1
name: mock-crm
default_action: block

# Session-state controls (Phase 3a). web.fetch pulls in untrusted content, so
# it taints the session; once tainted, outbound/mutating tools are blocked.
taint_sources: [web.fetch]
taint_sinks: [http.post, db.execute_sql]
sequence_rules:
  - after: crm.get_customer
    forbid: http.post
    reason: no outbound POST after reading customer PII in the same session (exfiltration guard)

tools:
  crm.get_customer:
    action: redact                 # executable as of Phase 2b
    redaction: standard            # scrub validated PII + secrets before the LLM
    reason: customer records contain PII; strip before the LLM sees them
    roles:
      admin:
        action: allow
        reason: admins are cleared to see raw customer PII
      analyst:
        action: redact
        redaction: standard
        reason: analysts see masked PII only

  search.docs:
    action: allow
    reason: public documentation search, no sensitive data

  web.fetch:
    action: allow
    reason: public web fetch; taints the session (untrusted content)

  http.post:
    action: allow
    reason: outbound HTTP; allowed only while the session is clean (untainted)

  db.execute_sql:
    action: rewrite
    reason: read-only analytics access; unbounded queries are capped
    constraints:
      - arg: sql
        must_match: '^\s*SELECT\b'
        flags: i
        reason: only read-only SELECT statements are permitted for agent identities
    rewrites:
      - arg: sql
        append: " LIMIT 1000"
        unless_match: '\blimit\b'
        flags: i

  logs.tail:
    action: quarantine
    reason: raw logs may contain secrets; result withheld from the model and flagged for review

  admin.delete_user:
    action: require_approval   # fails closed until Phase 3's approval broker
    then: allow
    reason: destructive admin action requires a human to sign off
