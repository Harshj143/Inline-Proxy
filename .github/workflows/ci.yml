name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest
      - name: Redaction accuracy metrics
        run: |
          python -m mcp_gateway redact --eval --profile standard | tee redaction-metrics.txt
      - name: Upload redaction metrics
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: redaction-metrics
          path: redaction-metrics.txt
